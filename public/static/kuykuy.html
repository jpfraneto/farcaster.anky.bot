<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KuyKuy - Tu puente de pagos fluidos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      /* Your existing styles remain unchanged */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont,
          sans-serif;
        height: 100vh;
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        color: white;
        overflow: hidden;
      }

      @keyframes gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        position: relative;
        backdrop-filter: blur(5px);
      }

      .logo {
        font-size: 5rem;
        font-weight: 900;
        margin: 40px 0;
        background: linear-gradient(45deg, #fff, #ffffffaa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        animation: glow 2s ease-in-out infinite alternate;
      }

      @keyframes glow {
        from {
          text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        to {
          text-shadow: 0 0 30px rgba(255, 255, 255, 0.8),
            0 0 40px rgba(255, 255, 255, 0.3);
        }
      }

      .bridge {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.9) 20%,
          rgba(255, 255, 255, 1) 50%,
          rgba(255, 255, 255, 0.9) 80%,
          transparent 100%
        );
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.5;
        }
      }

      .buttons {
        position: absolute;
        display: flex;
        gap: 40px;
        width: 100%;
        max-width: 800px;
        justify-content: center;
        z-index: 2;
      }

      .old-world {
        top: 20%;
      }

      .new-world {
        bottom: 20%;
      }

      .button {
        flex: 1;
        padding: 30px;
        border: none;
        border-radius: 20px;
        font-size: 1.8rem;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        max-width: 250px;
        position: relative;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        margin: 0 auto;
      }

      .button:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        background: rgba(255, 255, 255, 0.2);
      }

      .button svg {
        width: 50px;
        height: 50px;
        stroke: currentColor;
        transition: transform 0.3s ease;
      }

      .button:hover svg {
        transform: scale(1.2);
      }

      .old-world .button {
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }

      .new-world .button {
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        justify-content: center;
        align-items: center;
        z-index: 1000;
        animation: modalFade 0.3s ease-out;
      }

      @keyframes modalFade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-content {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        padding: 3rem;
        border-radius: 30px;
        width: 90%;
        max-width: 500px;
        text-align: center;
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }

      .amount-picker {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 2rem 0;
        justify-content: center;
      }

      .amount-picker input {
        width: 200px;
        padding: 1rem;
        font-size: 1.5rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        text-align: center;
        transition: all 0.3s ease;
      }

      .amount-picker input:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      }

      .token-info {
        font-size: 1.5rem;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }

      #qrcode {
        display: none;
        margin: 2rem auto;
        padding: 2rem;
        background: white;
        border-radius: 20px;
        width: fit-content;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: scaleIn 0.5s ease-out;
      }

      .qr-overlay {
        background: rgba(0, 0, 0, 0.95);
        padding: 3rem;
        border-radius: 30px;
        text-align: center;
      }

      .qr-container {
        background: white;
        padding: 1.5rem;
        border-radius: 15px;
        width: 200px;
        height: 200px;
        margin: 2rem auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .qr-message {
        color: white;
        margin-bottom: 1.5rem;
        font-size: 1.2rem;
        line-height: 1.5;
      }

      .qr-subtitle {
        color: #aaa;
        font-size: 0.9rem;
        margin-top: 1rem;
      }

      @keyframes scaleIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @media (max-width: 768px) {
        .logo {
          font-size: 3rem;
        }

        .buttons {
          flex-direction: column;
          align-items: center;
        }

        .button {
          width: 90%;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">farbarter</div>

      <div class="bridge"></div>

      <div class="buttons old-world">
        <button class="button" onclick="showAmountPicker()">sell</button>
      </div>

      <div class="buttons new-world">
        <button class="button" onclick="handleBuy()">buy</button>
      </div>
    </div>

    <div id="sellModal" class="modal">
      <div class="modal-content">
        <h2 style="font-size: 2.5rem; margin-bottom: 2rem">
          how much does it cost?
        </h2>
        <div class="amount-picker">
          <input
            type="number"
            id="amount"
            min="0"
            value="8"
            step="0.01"
            placeholder="0.00"
          />
          <div class="token-info">USDC</div>
        </div>
        <button class="button" onclick="handleSell()">sell</button>
        <div id="qrcode"></div>
      </div>
    </div>

    <div id="buyModal" class="modal">
      <div class="modal-content">
        <div class="qr-overlay">
          <div class="qr-container">
            <img
              id="desktopQR"
              src="https://github.com/jpfraneto/images/blob/main/qrcode.png?raw=true"
              alt="QR Code"
            />
          </div>
        </div>
      </div>
    </div>

    <script>
      function showAmountPicker() {
        document.getElementById("sellModal").style.display = "flex";
        document.getElementById("qrcode").style.display = "none";
        // Clear any existing QR code
        document.getElementById("qrcode").innerHTML = "";
      }

      const url = "https://farcaster.anky.bot";

      async function handleSell() {
        console.log("Starting handleSell function...");
        try {
          const amount = document.getElementById("amount").value;
          console.log("Amount entered:", amount);

          const uuid = crypto.randomUUID();
          console.log("Generated UUID:", uuid);

          console.log("Making POST request to create sale...");
          const response = await fetch(`${url}/daimo/create-sale`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            credentials: "include",
            body: JSON.stringify({
              amount,
              idempotencyKey: uuid,
            }),
          });

          const data = await response.json();
          console.log("Received response data:", data);

          if (data.paymentLink) {
            console.log("Payment link received, updating UI...");
            document.querySelector(".amount-picker").style.display = "none";
            document.querySelector(".button").style.display = "none";

            // Clear any existing QR code
            const qrcodeElement = document.getElementById("qrcode");
            qrcodeElement.innerHTML = "";
            qrcodeElement.style.display = "block";

            // Create new QR code
            new QRCode(qrcodeElement, {
              text: data.paymentLink,
              width: 256,
              height: 256,
              colorDark: "#000000",
              colorLight: "#ffffff",
              correctLevel: QRCode.CorrectLevel.H,
            });
          } else {
            console.log("No payment link received in response");
            alert("Error generating payment link. Please try again.");
          }
        } catch (error) {
          console.error("Error in handleSell:", error);
          alert("Error processing sale. Please try again.");
        }
      }

      async function handleBuy() {
        console.log("Starting handleBuy function...");
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        console.log("Device is mobile:", isMobile);

        if (isMobile) {
          console.log("Attempting to access mobile camera...");
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "environment" },
            });
            console.log("Camera access granted");
            // Here you would typically initialize a QR code scanner
            // For this example, we'll just stop the stream
            stream.getTracks().forEach((track) => track.stop());
            console.log("Camera stream stopped");
          } catch (error) {
            console.error("Error accessing camera:", error);
            alert("Could not access camera. Please try again.");
          }
        } else {
          alert("you can only click that button on a phone");
          // If on desktop, show QR code modal
          //   const buyModal = document.getElementById("buyModal");
          //   buyModal.style.display = "flex";

          //   // Set modal content size and position
          //   const modalContent = buyModal.querySelector(".modal-content");
          //   if (modalContent) {
          //     modalContent.style.maxWidth = "400px";
          //     modalContent.style.margin = "auto";
          //   }

          //   // Set QR overlay size
          //   const qrOverlay = buyModal.querySelector(".qr-overlay");
          //   if (qrOverlay) {
          //     qrOverlay.style.maxWidth = "300px";
          //     qrOverlay.style.margin = "auto";
          //   }
        }
      }

      // Close modal when clicking outside
      window.onclick = function (event) {
        console.log("Window click detected");
        if (event.target.className === "modal") {
          console.log("Closing modal");
          event.target.style.display = "none";

          // Reset the sell form when closing the modal
          const amountPicker = document.querySelector(".amount-picker");
          const sellButton = document.querySelector("#sellModal .button");
          if (amountPicker && sellButton) {
            amountPicker.style.display = "flex";
            sellButton.style.display = "flex";
          }

          // Clear amount input
          const amountInput = document.getElementById("amount");
          if (amountInput) {
            amountInput.value = "";
          }
        }
      };
    </script>
  </body>
</html>
